<nb-card [nbSpinner]="loading" nbSpinnerStatus="primary">
  <nb-card-header class="d-flex justify-content-between align-items-center">
    <span>Histórico de Olimpíadas Recreativas</span>
  </nb-card-header>
  <nb-card-body>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      
      <div class="row">
          <!-- Math Olympics Section -->
          <div class="col-md-6">
            <nb-card accent="primary">
              <nb-card-header>Olimpíada Recreativa de Matemática</nb-card-header>
              <nb-card-body formGroupName="mathOlympics">
                <div class="row">
                  <div class="col-md-12"><h6>Fase Regional</h6></div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="label">Clasificados</label>
                      <input nbInput fullWidth type="number" formControlName="regionalClassified">
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="label">Oro</label>
                      <input nbInput fullWidth type="number" formControlName="regionalGold">
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="label">Plata</label>
                      <input nbInput fullWidth type="number" formControlName="regionalSilver">
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="label">Bronce</label>
                      <input nbInput fullWidth type="number" formControlName="regionalBronze">
                    </div>
                  </div>
                </div>
                <hr>
                <div class="row mt-3">
                  <div class="col-md-12"><h6>Fase Nacional</h6></div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="label">Clasificados</label>
                      <input nbInput fullWidth type="number" formControlName="nationalClassified">
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="label">Oro</label>
                      <input nbInput fullWidth type="number" formControlName="nationalGold">
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="label">Plata</label>
                      <input nbInput fullWidth type="number" formControlName="nationalSilver">
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="label">Bronce</label>
                      <input nbInput fullWidth type="number" formControlName="nationalBronze">
                    </div>
                  </div>
                </div>
              </nb-card-body>
            </nb-card>
          </div>

          <!-- Reading Olympics Section -->
          <div class="col-md-6">
            <nb-card accent="success">
              <nb-card-header>Olimpíada Recreativa de Lengua</nb-card-header>
              <nb-card-body formGroupName="readingOlympics">
                <div class="row">
                  <div class="col-md-12"><h6>Fase Regional</h6></div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="label">Clasificados</label>
                      <input nbInput fullWidth type="number" formControlName="regionalClassified">
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="label">Oro</label>
                      <input nbInput fullWidth type="number" formControlName="regionalGold">
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="label">Plata</label>
                      <input nbInput fullWidth type="number" formControlName="regionalSilver">
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="label">Bronce</label>
                      <input nbInput fullWidth type="number" formControlName="regionalBronze">
                    </div>
                  </div>
                </div>
                <hr>
                <div class="row mt-3">
                  <div class="col-md-12"><h6>Fase Nacional</h6></div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="label">Clasificados</label>
                      <input nbInput fullWidth type="number" formControlName="nationalClassified">
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="label">Oro</label>
                      <input nbInput fullWidth type="number" formControlName="nationalGold">
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="label">Plata</label>
                      <input nbInput fullWidth type="number" formControlName="nationalSilver">
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="label">Bronce</label>
                      <input nbInput fullWidth type="number" formControlName="nationalBronze">
                    </div>
                  </div>
                </div>
              </nb-card-body>
            </nb-card>
          </div>
      </div>

      <div class="d-flex justify-content-end">
        <button nbButton status="primary" type="submit" [disabled]="!form.valid || loading">Guardar Histórico</button>
      </div>

    </form>
  </nb-card-body>
</nb-card>
